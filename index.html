<!DOCTYPE html>
<html lang="en">
<head>

    <title>Awaaz Global Mall | Gold & Blue Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loader-line"></div>
    <img id="bg1" class="bg-layer active" src="" alt="bg1">

            <div class="handle" id="handle">
                <span>➔</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>

</html>
