name: Deal Bot Runner
on:
  workflow_dispatch: # Isse manual button aayega
  schedule:
    - cron: '0 * * * *' # Har 1 ghante mein apne aap chalega

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Code Download Karo
        uses: actions/checkout@v3

      - name: Python Setup Karo
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Tools Install Karo
        run: pip install -r requirements.txt

      - name: Bot Chalao
        env:
          # Ye line aapke Secret ko Code se jodti hai
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
        run: python bot.py
